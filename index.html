    .footer {
      margin-top: 12px;
      font-size: 12px;
      color: #666;
    }
    .pill {
      display:inline-block;
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 999px;
      border: 1px solid #ddd;
      background:#fff;
      color:#333;
      margin-left: 8px;
      vertical-align: middle;
      white-space: nowrap;
    }
    .muted { color:#666; font-weight: 600; }

  const DATA = PAYLOAD.data;
  const dateSelect = document.getElementById('dateSelect');

  function escapeHtml(str) {
    return String(str)

      .replaceAll('<','&lt;')
      .replaceAll('>','&gt;')
      .replaceAll('"','&quot;')
      .replaceAll("'",'&#39;');

  function renderStakeList(items, showPeople) {
